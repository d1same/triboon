name: test & publish

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing vX.Y.Z tag to build + attach signed APKs to"
        required: true

permissions:
  contents: read
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      # ffmpeg unlocks the remux/transcode tests (they self-skip without it).
      - run: sudo apt-get update && sudo apt-get install -y --no-install-recommends ffmpeg
      # Release gate: engine/archive/player/IPTV/subtitle/security/library coverage.
      - run: npm test

  docker:
    needs: test
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=sha
      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # On a vX.Y.Z tag (or manual run), build the SIGNED release APK and attach it to the
  # GitHub release under the TV + mobile names + the stable "latest" aliases, so the in-app
  # "Update Android TV" always resolves to the newest build. Signing comes from repo secrets
  # (TRIBOON_RELEASE_*). If this job ever fails, the local fallback is: npm run release:apk -- -Release.
  release-apk:
    needs: test
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref_name }}
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: android-actions/setup-android@v3
      - name: Decode release keystore
        run: echo "${{ secrets.TRIBOON_RELEASE_KEYSTORE_B64 }}" | base64 -d > "${{ runner.temp }}/triboon-release.jks"
      - name: Build signed release APK
        env:
          TRIBOON_RELEASE_STORE_FILE: ${{ runner.temp }}/triboon-release.jks
          TRIBOON_RELEASE_STORE_PASSWORD: ${{ secrets.TRIBOON_RELEASE_STORE_PASSWORD }}
          TRIBOON_RELEASE_KEY_ALIAS: ${{ secrets.TRIBOON_RELEASE_KEY_ALIAS }}
          TRIBOON_RELEASE_KEY_PASSWORD: ${{ secrets.TRIBOON_RELEASE_KEY_PASSWORD }}
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease --console=plain
      - name: Attach APKs to the release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          apk=android/app/build/outputs/apk/release/app-release.apk
          mkdir -p dist
          cp "$apk" "dist/triboon-tv-${TAG}.apk"
          cp "$apk" "dist/triboon-mobile-${TAG}.apk"
          cp "$apk" dist/triboon-tv.apk
          cp "$apk" dist/triboon-mobile.apk
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" dist/*.apk --clobber
          else
            gh release create "$TAG" dist/*.apk --title "Triboon $TAG" --generate-notes --latest
          fi
