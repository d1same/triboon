name: test & publish

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

# A newer main push supersedes an older latest-image build. Release tags instead serialize and
# remain retryable so one immutable version can never race itself or be cancelled halfway through.
concurrency:
  group: triboon-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref == 'refs/heads/main' }}

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
      # ffmpeg unlocks the remux/transcode tests (they self-skip without it).
      - run: sudo apt-get update && sudo apt-get install -y --no-install-recommends ffmpeg
      # Release gate: engine/archive/player/IPTV/subtitle/security/library coverage.
      - run: npm test

  android:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: android-actions/setup-android@9fc6c4e9069bf8d3d10b2204b1fb8f6ef7065407 # v3
      - name: Install exact Android 36.1 SDK inputs
        run: |
          sdkmanager "platforms;android-36.1" "build-tools;36.1.0"
          test -d "$ANDROID_HOME/platforms/android-36.1" \
            || { echo "Android 36.1 platform was not installed"; exit 1; }
          test -x "$ANDROID_HOME/build-tools/36.1.0/aapt" \
            || { echo "Android build-tools 36.1.0 were not installed"; exit 1; }
      - name: Android lint, native tests, and universal debug APK
        run: |
          chmod +x android/gradlew
          android/gradlew -p android lintDebug testDebugUnitTest assembleDebug --console=plain

  release-preflight:
    needs: [test, android]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
      - name: Verify exact version tag and main-branch provenance
        env:
          TAG: ${{ github.ref_name }}
        run: |
          version=$(node -p "require('./package.json').version")
          test "$TAG" = "v$version" || { echo "tag $TAG does not match package v$version"; exit 1; }
          git fetch --no-tags origin +refs/heads/main:refs/remotes/origin/main
          test "$(git rev-parse HEAD)" = "$(git rev-parse origin/main)" \
            || { echo "release tag must point at the current origin/main commit"; exit 1; }
          test "$(git rev-parse "$TAG^{commit}")" = "$GITHUB_SHA" \
            || { echo "release tag does not resolve to the workflow commit"; exit 1; }
          node --test test/release-contract.test.js

  docker-check:
    needs: [test, android]
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      - uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  docker-main:
    needs: [test, android, windows-client]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Revalidate current main before publishing the latest image
        run: |
          git fetch --no-tags origin +refs/heads/main:refs/remotes/origin/main
          test "$(git rev-parse origin/main)" = "$GITHUB_SHA" \
            || { echo "main advanced while tests ran; refusing to replace latest with a stale image"; exit 1; }
      - uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest
            type=sha
      - uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  verify-public-container-main:
    needs: docker-main
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      - name: Verify anonymous latest manifest, revision, health, and API version
        env:
          IMAGE: ghcr.io/${{ github.repository }}:latest
          EXPECTED_REVISION: ${{ github.sha }}
        run: |
          docker logout ghcr.io >/dev/null 2>&1 || true
          for attempt in $(seq 1 12); do
            docker buildx imagetools inspect --raw "$IMAGE" > manifest.json && break
            test "$attempt" -lt 12 || { echo "public manifest did not become readable"; exit 1; }
            sleep 5
          done
          node <<'NODE'
          const fs = require('fs');
          const manifest = JSON.parse(fs.readFileSync('manifest.json', 'utf8'));
          const platforms = new Set((manifest.manifests || []).map((m) => `${m.platform?.os}/${m.platform?.architecture}`));
          for (const required of ['linux/amd64', 'linux/arm64']) {
            if (!platforms.has(required)) throw new Error(`public image is missing ${required}`);
          }
          NODE
          docker pull "$IMAGE"
          revision=$(docker image inspect "$IMAGE" --format '{{ index .Config.Labels "org.opencontainers.image.revision" }}')
          test "$revision" = "$EXPECTED_REVISION" || { echo "latest revision $revision != $EXPECTED_REVISION"; exit 1; }
          expected_version=$(node -p "require('./package.json').version")
          name="triboon-public-main-${GITHUB_RUN_ID}"
          volume="triboon-public-main-data-${GITHUB_RUN_ID}"
          cleanup() { docker rm -f "$name" >/dev/null 2>&1 || true; docker volume rm "$volume" >/dev/null 2>&1 || true; }
          trap cleanup EXIT
          docker volume create "$volume" >/dev/null
          docker run -d --name "$name" -p 127.0.0.1:17777:7777 -v "$volume:/data" "$IMAGE" >/dev/null
          for attempt in $(seq 1 30); do
            health=$(docker inspect "$name" --format '{{if .State.Health}}{{.State.Health.Status}}{{else}}{{.State.Status}}{{end}}')
            test "$health" = healthy && break
            test "$attempt" -lt 30 || { docker logs "$name"; echo "public image health=$health"; exit 1; }
            sleep 2
          done
          EXPECTED_VERSION="$expected_version" node <<'NODE'
          const response = await fetch('http://127.0.0.1:17777/api/server');
          if (!response.ok) throw new Error(`/api/server HTTP ${response.status}`);
          const body = await response.json();
          if (body.version !== process.env.EXPECTED_VERSION) {
            throw new Error(`/api/server version ${body.version} != ${process.env.EXPECTED_VERSION}`);
          }
          NODE

  # Tags build immutable artifacts only. One final publisher assembles every required asset into a
  # draft and publishes once, so parallel jobs can never expose a partial release.
  release-apk:
    needs: [test, android, release-preflight]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: android-actions/setup-android@9fc6c4e9069bf8d3d10b2204b1fb8f6ef7065407 # v3
      - name: Decode release keystore
        env:
          KEYSTORE_B64: ${{ secrets.TRIBOON_RELEASE_KEYSTORE_B64 }}
        run: |
          printf '%s' "$KEYSTORE_B64" | tr -d '[:space:]' | base64 -d > "${{ runner.temp }}/triboon-release.jks"
          test -s "${{ runner.temp }}/triboon-release.jks" || { echo "keystore decode produced an empty file"; exit 1; }
      - name: Build signed release APK
        env:
          TRIBOON_RELEASE_STORE_FILE: ${{ runner.temp }}/triboon-release.jks
          TRIBOON_RELEASE_STORE_PASSWORD: ${{ secrets.TRIBOON_RELEASE_STORE_PASSWORD }}
          TRIBOON_RELEASE_KEY_ALIAS: ${{ secrets.TRIBOON_RELEASE_KEY_ALIAS }}
          TRIBOON_RELEASE_KEY_PASSWORD: ${{ secrets.TRIBOON_RELEASE_KEY_PASSWORD }}
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease --console=plain
      - name: Verify APK signature and embedded version
        env:
          TAG: ${{ github.ref_name }}
          EXPECTED_CERT_SHA256: c0b1e2d90b443b07fe4ec4001496539aeb810d2bb9bba9a5f1d8781aa7e28d42
          STABLE_APK_URL: https://github.com/d1same/triboon/releases/latest/download/triboon.apk
        run: |
          apk=android/app/build/outputs/apk/release/app-release.apk
          current="${RUNNER_TEMP}/triboon-current-stable.apk"
          apksigner=$(find "$ANDROID_HOME/build-tools" -type f -name apksigner | sort -V | tail -1)
          aapt=$(find "$ANDROID_HOME/build-tools" -type f -name aapt | sort -V | tail -1)
          test -x "$apksigner" || { echo "apksigner not found"; exit 1; }
          test -x "$aapt" || { echo "aapt not found"; exit 1; }
          certs=$("$apksigner" verify --verbose --print-certs "$apk")
          printf '%s\n' "$certs"
          printf '%s\n' "$certs" | grep -Fi "certificate SHA-256 digest: $EXPECTED_CERT_SHA256"
          version=${TAG#v}
          badging=$("$aapt" dump badging "$apk")
          printf '%s\n' "$badging" | grep -F "package: name='app.triboon.tv'"
          printf '%s\n' "$badging" | grep -F "versionName='$version'"
          new_code=$(printf '%s\n' "$badging" | sed -n "s/^package:.*versionCode='\([0-9][0-9]*\)'.*/\1/p")
          test -n "$new_code" || { echo "new APK versionCode is missing"; exit 1; }

          curl --proto '=https' --tlsv1.2 --fail --location --retry 3 --output "$current" "$STABLE_APK_URL"
          current_certs=$("$apksigner" verify --verbose --print-certs "$current")
          printf '%s\n' "$current_certs" | grep -Fi "certificate SHA-256 digest: $EXPECTED_CERT_SHA256"
          current_badging=$("$aapt" dump badging "$current")
          printf '%s\n' "$current_badging" | grep -F "package: name='app.triboon.tv'"
          current_code=$(printf '%s\n' "$current_badging" | sed -n "s/^package:.*versionCode='\([0-9][0-9]*\)'.*/\1/p")
          test -n "$current_code" || { echo "stable APK versionCode is missing"; exit 1; }
          test "$new_code" -gt "$current_code" || {
            echo "release versionCode $new_code must be greater than stable $current_code"
            exit 1
          }
      - name: Stage universal APK assets
        env:
          TAG: ${{ github.ref_name }}
        run: |
          apk=android/app/build/outputs/apk/release/app-release.apk
          mkdir -p dist
          cp "$apk" "dist/triboon-${TAG}.apk"
          cp "$apk" dist/triboon.apk
          cmp -s "dist/triboon-${TAG}.apk" dist/triboon.apk
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: release-apk
          path: dist/*.apk
          if-no-files-found: error
          retention-days: 2

  # Build the one-click Windows server installer as an immutable workflow artifact. Publishing is
  # owned by publish-release below after every required job succeeds.
  release-windows-server:
    needs: [test, android, release-preflight]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      # Install the exact compiler recorded in dependencies.lock.json. The helper verifies the
      # immutable release asset, its Authenticode signer, and installed compiler hash.
      - name: Install locked Inno Setup
        shell: pwsh
        run: powershell -ExecutionPolicy Bypass -File installer/windows/install-inno.ps1
      - name: Build server installer
        shell: pwsh
        run: powershell -ExecutionPolicy Bypass -File installer/windows/build-installer.ps1
      - name: Locate installer
        shell: bash
        env:
          TAG: ${{ github.ref_name }}
        run: |
          setup=$(ls installer/windows/dist/Triboon-Setup-v*.exe | head -1)
          test -n "$setup" || { echo "no server installer produced"; exit 1; }
          mkdir -p dist
          cp "$setup" dist/Triboon-Windows-Server.exe
          cp "$setup" "dist/Triboon-Windows-Server-${TAG}.exe"
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: release-windows-server
          path: dist/Triboon-Windows-Server*.exe
          if-no-files-found: error
          retention-days: 2

  docker-release:
    needs: [release-preflight, release-apk, release-windows-server, windows-client]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Revalidate current main before publishing the immutable image
        run: |
          git fetch --no-tags origin +refs/heads/main:refs/remotes/origin/main
          test "$(git rev-parse origin/main)" = "$GITHUB_SHA" \
            || { echo "main advanced after release preflight; refusing to publish a stale semver image"; exit 1; }
      - uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: type=semver,pattern={{version}}
      - uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  verify-public-container-release:
    needs: docker-release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      - name: Verify anonymous semver and latest manifests, revision, health, and API version
        env:
          EXPECTED_REVISION: ${{ github.sha }}
        run: |
          version=${GITHUB_REF_NAME#v}
          image="ghcr.io/${GITHUB_REPOSITORY,,}:$version"
          latest="ghcr.io/${GITHUB_REPOSITORY,,}:latest"
          docker logout ghcr.io >/dev/null 2>&1 || true
          fetch_manifest() {
            ref="$1"
            output="$2"
            label="$3"
            for attempt in $(seq 1 12); do
              docker buildx imagetools inspect --raw "$ref" > "$output" && return 0
              test "$attempt" -lt 12 || { echo "public $label manifest did not become readable"; return 1; }
              sleep 5
            done
          }
          fetch_manifest "$image" manifest-semver.json semver
          fetch_manifest "$latest" manifest-latest.json latest
          node <<'NODE'
          const fs = require('fs');
          for (const [label, file] of [['semver', 'manifest-semver.json'], ['latest', 'manifest-latest.json']]) {
            const manifest = JSON.parse(fs.readFileSync(file, 'utf8'));
            const platforms = new Set((manifest.manifests || []).map((m) => `${m.platform?.os}/${m.platform?.architecture}`));
            for (const required of ['linux/amd64', 'linux/arm64']) {
              if (!platforms.has(required)) throw new Error(`public ${label} image is missing ${required}`);
            }
          }
          NODE
          docker pull "$image"
          docker pull "$latest"
          revision=$(docker image inspect "$image" --format '{{ index .Config.Labels "org.opencontainers.image.revision" }}')
          test "$revision" = "$EXPECTED_REVISION" || { echo "semver revision $revision != $EXPECTED_REVISION"; exit 1; }
          latest_revision=$(docker image inspect "$latest" --format '{{ index .Config.Labels "org.opencontainers.image.revision" }}')
          test "$latest_revision" = "$EXPECTED_REVISION" || { echo "latest revision $latest_revision != $EXPECTED_REVISION"; exit 1; }
          expected_version=$(node -p "require('./package.json').version")
          test "$version" = "$expected_version" || { echo "tag version $version != package $expected_version"; exit 1; }
          name="triboon-public-release-${GITHUB_RUN_ID}"
          volume="triboon-public-release-data-${GITHUB_RUN_ID}"
          cleanup() { docker rm -f "$name" >/dev/null 2>&1 || true; docker volume rm "$volume" >/dev/null 2>&1 || true; }
          trap cleanup EXIT
          docker volume create "$volume" >/dev/null
          docker run -d --name "$name" -p 127.0.0.1:17777:7777 -v "$volume:/data" "$image" >/dev/null
          for attempt in $(seq 1 30); do
            health=$(docker inspect "$name" --format '{{if .State.Health}}{{.State.Health.Status}}{{else}}{{.State.Status}}{{end}}')
            test "$health" = healthy && break
            test "$attempt" -lt 30 || { docker logs "$name"; echo "public image health=$health"; exit 1; }
            sleep 2
          done
          EXPECTED_VERSION="$expected_version" node <<'NODE'
          const response = await fetch('http://127.0.0.1:17777/api/server');
          if (!response.ok) throw new Error(`/api/server HTTP ${response.status}`);
          const body = await response.json();
          if (body.version !== process.env.EXPECTED_VERSION) {
            throw new Error(`/api/server version ${body.version} != ${process.env.EXPECTED_VERSION}`);
          }
          NODE

  publish-release:
    needs: [release-preflight, release-apk, release-windows-server, windows-client, docker-release, verify-public-container-release]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          pattern: release-*
          path: release-assets
          merge-multiple: true
      - name: Validate the complete immutable asset set
        env:
          TAG: ${{ github.ref_name }}
        run: |
          version=$(node -p "require('./package.json').version")
          test "$TAG" = "v$version"
          test -s "release-assets/triboon-${TAG}.apk"
          test -s release-assets/triboon.apk
          test -s "release-assets/Triboon-Windows-Server-${TAG}.exe"
          test -s release-assets/Triboon-Windows-Server.exe
          test -s "release-assets/Triboon-Windows-Client-${TAG}.exe"
          test -s release-assets/Triboon-Windows-Client.exe
          cmp -s "release-assets/triboon-${TAG}.apk" release-assets/triboon.apk
          cmp -s "release-assets/Triboon-Windows-Server-${TAG}.exe" release-assets/Triboon-Windows-Server.exe
          cmp -s "release-assets/Triboon-Windows-Client-${TAG}.exe" release-assets/Triboon-Windows-Client.exe
          mapfile -t actual < <(find release-assets -maxdepth 1 -type f -printf '%f\n' | sort)
          expected=("Triboon-Windows-Client-${TAG}.exe" "Triboon-Windows-Client.exe" "Triboon-Windows-Server-${TAG}.exe" "Triboon-Windows-Server.exe" "triboon-${TAG}.apk" "triboon.apk")
          mapfile -t expected < <(printf '%s\n' "${expected[@]}" | sort)
          diff -u <(printf '%s\n' "${expected[@]}") <(printf '%s\n' "${actual[@]}")
          (cd release-assets && sha256sum "Triboon-Windows-Client-${TAG}.exe" Triboon-Windows-Client.exe "Triboon-Windows-Server-${TAG}.exe" Triboon-Windows-Server.exe "triboon-${TAG}.apk" triboon.apk > SHA256SUMS.txt)
      - name: Publish once, only after every required artifact passed
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          git fetch --force --no-tags origin "refs/tags/$TAG:refs/tags/$TAG"
          git fetch --no-tags origin +refs/heads/main:refs/remotes/origin/main
          test "$(git rev-parse "$TAG^{commit}")" = "$GITHUB_SHA" \
            || { echo "remote release tag moved after preflight; refusing to publish stale artifacts"; exit 1; }
          test "$(git rev-parse origin/main)" = "$GITHUB_SHA" \
            || { echo "main advanced after artifacts were built; refusing to publish a stale release"; exit 1; }
          marker="<!-- triboon-release:${TAG}:${GITHUB_SHA}:${GITHUB_RUN_ID} -->"
          if gh release view "$TAG" >/dev/null 2>&1; then
            is_draft=$(gh release view "$TAG" --json isDraft --jq .isDraft)
            body=$(gh release view "$TAG" --json body --jq .body)
            if [ "$is_draft" = true ] && printf '%s' "$body" | grep -Fq "$marker"; then
              echo "Removing the incomplete CI-owned draft for this exact tag/commit before retry."
              gh release delete "$TAG" --yes
            else
              echo "Release $TAG already exists and is not this workflow's recoverable draft; refusing to overwrite it."
              exit 1
            fi
          fi
          gh release create "$TAG" release-assets/* --verify-tag --title "Triboon $TAG" --generate-notes --notes "$marker" --draft
          gh release edit "$TAG" --draft=false --latest

  # Production Windows client gate. Every PR/main/tag run compiles the native libmpv path with
  # MSVC; release tags additionally stage the immutable installer pair for the final publisher.
  # Physical GPU decoding remains a documented live gate because hosted CI has no representative
  # NVIDIA/AMD/Intel display and `hwdec=auto-safe` alone is not proof that hardware decode engaged.
  windows-client:
    needs: test
    runs-on: windows-latest
    timeout-minutes: 50
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: stable-x86_64-pc-windows-msvc
      - uses: ilammy/msvc-dev-cmd@0b201ec74fa43914dc39ae48a89fd1d8cb592756 # v1; puts lib.exe + MSVC on PATH
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
        with:
          workspaces: clients/windows-px8/src-tauri
      - name: Verify Windows client and release contracts
        run: node --test test/windows-px8-player.test.js test/release-contract.test.js
      - name: Build, inspect, and stage the locked Windows client
        shell: pwsh
        env:
          TAG: ${{ github.ref_name }}
        run: |
          $buildParams = @{
            CacheDirectory = Join-Path $env:RUNNER_TEMP 'triboon-libmpv'
            ArtifactDirectory = 'dist'
          }
          if ($env:GITHUB_REF -like 'refs/tags/v*') {
            $buildParams.Tag = $env:TAG
          }
          & .\clients\windows-px8\scripts\build-package.ps1 @buildParams
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        with:
          name: Triboon-Windows-Client-${{ github.sha }}
          path: dist/Triboon-Windows-Client.exe
          if-no-files-found: error
          retention-days: 7
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: ${{ startsWith(github.ref, 'refs/tags/v') }}
        with:
          name: release-windows-client
          path: dist/Triboon-Windows-Client*.exe
          if-no-files-found: error
          retention-days: 2
