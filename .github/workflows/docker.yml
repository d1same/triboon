name: test & publish

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing vX.Y.Z tag to build + attach the APK/Windows installers to (leave blank for a native-client experiment build)"
        required: false
      native_client:
        description: "Build the experimental libmpv native Windows client (artifact only, does not touch releases)"
        type: boolean
        default: false

permissions:
  contents: read
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      # ffmpeg unlocks the remux/transcode tests (they self-skip without it).
      - run: sudo apt-get update && sudo apt-get install -y --no-install-recommends ffmpeg
      # Release gate: engine/archive/player/IPTV/subtitle/security/library coverage.
      - run: npm test

  docker:
    needs: test
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=sha
      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # On a vX.Y.Z tag (or manual run), build the SIGNED release APK and attach it to the
  # GitHub release under the TV + mobile names + the stable "latest" aliases, so the in-app
  # "Update Android TV" always resolves to the newest build. Signing comes from repo secrets
  # (TRIBOON_RELEASE_*). If this job ever fails, the local fallback is: npm run release:apk -- -Release.
  release-apk:
    needs: test
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && github.event.inputs.tag != '')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref_name }}
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: android-actions/setup-android@v3
      - name: Decode release keystore
        # tr strips any CR/LF/spaces the secret may carry (e.g. from a CRLF host) so base64 -d
        # never sees invalid input; then sanity-check it's a real keystore (PK zip magic).
        run: |
          echo "${{ secrets.TRIBOON_RELEASE_KEYSTORE_B64 }}" | tr -d '[:space:]' | base64 -d > "${{ runner.temp }}/triboon-release.jks"
          test -s "${{ runner.temp }}/triboon-release.jks" || { echo "keystore decode produced an empty file"; exit 1; }
      - name: Build signed release APK
        env:
          TRIBOON_RELEASE_STORE_FILE: ${{ runner.temp }}/triboon-release.jks
          TRIBOON_RELEASE_STORE_PASSWORD: ${{ secrets.TRIBOON_RELEASE_STORE_PASSWORD }}
          TRIBOON_RELEASE_KEY_ALIAS: ${{ secrets.TRIBOON_RELEASE_KEY_ALIAS }}
          TRIBOON_RELEASE_KEY_PASSWORD: ${{ secrets.TRIBOON_RELEASE_KEY_PASSWORD }}
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease --console=plain
      - name: Attach APKs to the release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          apk=android/app/build/outputs/apk/release/app-release.apk
          mkdir -p dist
          # One universal APK for TV + phone. The legacy triboon-tv/mobile names were retired in the
          # v1.7.67→.68 migration once every device ran a build whose updater accepts triboon.apk.
          cp "$apk" "dist/triboon-${TAG}.apk"
          cp "$apk" dist/triboon.apk
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" dist/*.apk --clobber
          else
            gh release create "$TAG" dist/*.apk --title "Triboon $TAG" --generate-notes --latest
          fi

  # On a vX.Y.Z tag (or manual run), build the Tauri "PX8" native Windows client and attach its
  # installer to the GitHub release. This is built in CI on purpose: the dev box runs Windows Smart
  # App Control (Enforce), which blocks the unsigned cargo build-script executables a Tauri build
  # generates. GitHub's windows runners have no such policy (and ship MSVC + Rust), so the build is
  # clean and reproducible here. Uploads a versioned name plus a stable alias so
  # /releases/latest/download/Triboon-Windows-Client.exe always resolves to the newest client.
  release-windows-client:
    needs: test
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && github.event.inputs.tag != '')
    runs-on: windows-latest
    timeout-minutes: 40
    permissions:
      contents: write
    steps:
      # Build from the triggering ref: on a vX.Y.Z tag that IS the tag (tags are cut from main, so
      # they contain clients/windows-px8); on manual dispatch it's the selected branch (main). Do NOT
      # pin to an input tag — old tags predate clients/windows-px8 and the checkout would lack the dir.
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      # windows-latest ships MSVC (VS 2022 C++ tools) + Rust, but pin the toolchain for determinism.
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: clients/windows-px8/src-tauri
      - name: Install Tauri CLI (prebuilt, no source compile)
        working-directory: clients/windows-px8
        run: npm ci
      - name: Build PX8 installer (NSIS)
        working-directory: clients/windows-px8
        run: npm run tauri build
      - name: Locate installer
        shell: bash
        run: |
          # Tauri NSIS output: "Triboon PX8_<ver>_x64-setup.exe" (productName has a space) — glob it.
          setup=$(ls clients/windows-px8/src-tauri/target/release/bundle/nsis/*-setup.exe | head -1)
          test -n "$setup" || { echo "no NSIS installer produced"; exit 1; }
          mkdir -p dist
          cp "$setup" dist/Triboon-Windows-Client.exe
      # Always publish a downloadable build artifact — lets a manual dispatch produce a test .exe
      # without attaching to (and misrepresenting) an existing release.
      - uses: actions/upload-artifact@v4
        with:
          name: Triboon-Windows-Client
          path: dist/Triboon-Windows-Client.exe
      # On a real vX.Y.Z tag, ALSO attach to that release: versioned name + stable "latest" alias so
      # /releases/latest/download/Triboon-Windows-Client.exe always resolves to the newest client.
      - name: Attach installer to the release
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          cp dist/Triboon-Windows-Client.exe "dist/Triboon-Windows-Client-${TAG}.exe"
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" dist/Triboon-Windows-Client*.exe --clobber
          else
            gh release create "$TAG" dist/Triboon-Windows-Client*.exe --title "Triboon $TAG" --generate-notes --latest
          fi

  # On a vX.Y.Z tag (or manual run), build the one-click Windows SERVER installer (installer/windows/
  # build-installer.ps1: bundles Node 24 + ffmpeg + yt-dlp + alass, hash-verified, and compiles with
  # Inno Setup) and attach it to the release. Same stable-alias contract as the APK + client, so
  # /releases/latest/download/Triboon-Windows-Server.exe always resolves to the newest server build.
  release-windows-server:
    needs: test
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && github.event.inputs.tag != '')
    runs-on: windows-latest
    timeout-minutes: 40
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      # Inno Setup provides ISCC.exe (the script auto-detects it under Program Files). Chocolatey is
      # preinstalled on the runner; install is idempotent if the image already ships it.
      - name: Ensure Inno Setup
        shell: pwsh
        run: choco install innosetup -y --no-progress
      - name: Build server installer
        shell: pwsh
        run: powershell -ExecutionPolicy Bypass -File installer/windows/build-installer.ps1
      - name: Locate installer
        shell: bash
        run: |
          setup=$(ls installer/windows/dist/Triboon-Setup-v*.exe | head -1)
          test -n "$setup" || { echo "no server installer produced"; exit 1; }
          mkdir -p dist
          cp "$setup" dist/Triboon-Windows-Server.exe
      - uses: actions/upload-artifact@v4
        with:
          name: Triboon-Windows-Server
          path: dist/Triboon-Windows-Server.exe
      - name: Attach installer to the release
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          cp dist/Triboon-Windows-Server.exe "dist/Triboon-Windows-Server-${TAG}.exe"
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" dist/Triboon-Windows-Server*.exe --clobber
          else
            gh release create "$TAG" dist/Triboon-Windows-Server*.exe --title "Triboon $TAG" --generate-notes --latest
          fi

  # EXPERIMENTAL native-player (libmpv) build — dispatch-only (native_client=true), artifact only, never
  # touches a release. De-risks the libmpv toolchain (M1): fetch the mpv dev bundle, make an MSVC import
  # lib, build the Tauri client with the `player` feature, and bundle libmpv-2.dll for the owner to test.
  # Once it compiles + runs on a real Windows/GPU box, this folds into release-windows-client.
  build-windows-client-native:
    needs: test
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.native_client == 'true'
    runs-on: windows-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - uses: dtolnay/rust-toolchain@stable
      - uses: ilammy/msvc-dev-cmd@v1   # puts lib.exe + the MSVC toolchain env on PATH
      - name: Fetch libmpv dev bundle (headers + libmpv-2.dll + mpv.def)
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p libmpv && cd libmpv
          # Auto-resolve the latest plain x86_64 dev bundle (avoids a stale pinned URL 404).
          gh release download --repo zhongfly/mpv-winbuild --pattern 'mpv-dev-x86_64-2*.7z' --dir . \
            || gh release download --repo shinchiro/mpv-winbuild-cmake --pattern 'mpv-dev-x86_64-2*.7z' --dir .
          7z x -y mpv-dev-x86_64-*.7z
          echo "==== extracted layout ===="; ls -R | head -60
      - name: Generate mpv import lib (robust to bundle layout)
        shell: pwsh
        run: |
          $dll = Get-ChildItem -Path libmpv -Recurse -Filter libmpv-2.dll | Select-Object -First 1
          if (-not $dll) { Write-Error "libmpv-2.dll not found in the bundle"; exit 1 }
          $root = $dll.DirectoryName
          "libmpv-2.dll at: $($dll.FullName)"
          $def = Get-ChildItem -Path libmpv -Recurse -Filter mpv.def | Select-Object -First 1
          if (-not $def) {
            # Bundle shipped no .def — synthesize one from the DLL's exported mpv_* symbols.
            "no mpv.def in bundle — synthesizing from DLL exports"
            $lines = & dumpbin /exports $dll.FullName
            $names = $lines | ForEach-Object { if ($_ -match '\s(mpv_[A-Za-z0-9_]+)\s*$') { $Matches[1] } } | Sort-Object -Unique
            if (-not $names) { Write-Error "no mpv_* exports found in DLL"; exit 1 }
            ("EXPORTS`n" + ($names -join "`n")) | Out-File -Encoding ascii "$root\mpv.def"
            $def = Get-Item "$root\mpv.def"
          }
          "using def: $($def.FullName)"
          & lib /def:$($def.FullName) /name:libmpv-2.dll /out:"$root\mpv.lib" /machine:X64
          if ($LASTEXITCODE -ne 0) { Write-Error "lib.exe failed"; exit 1 }
          Get-ChildItem $root | Select-Object Name,Length
          # Expose the bundle root (has include\ + mpv.lib) to later steps for libmpv-sys.
          "MPV_SOURCE=$root" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding ascii
      - name: Build native client (player feature)
        working-directory: clients/windows-px8
        # Default (pwsh) shell on purpose: a bash shell prepends Git's usr\bin, whose link.exe SHADOWS
        # MSVC's linker and breaks the Rust build-script link. pwsh keeps MSVC's link.exe (from
        # msvc-dev-cmd) on PATH — same as the working P1 job.
        run: |
          # libmpv-sys tells the linker to use mpv.lib; add its dir to LIB so MSVC's link.exe finds it
          # regardless of the crate's emitted search path.
          $env:LIB = "$env:MPV_SOURCE;$env:LIB"
          Write-Host "MPV_SOURCE=$env:MPV_SOURCE"
          npm ci
          npm run tauri build -- --features player
      - name: Stage installer + libmpv runtime DLL
        shell: bash
        run: |
          setup=$(ls clients/windows-px8/src-tauri/target/release/bundle/nsis/*-setup.exe | head -1)
          test -n "$setup" || { echo "no NSIS installer produced"; exit 1; }
          mkdir -p dist
          cp "$setup" dist/Triboon-Windows-Client-native.exe
          cp libmpv/libmpv-2.dll dist/ 2>/dev/null || cp libmpv/*/libmpv-2.dll dist/ 2>/dev/null || true
      - uses: actions/upload-artifact@v4
        with:
          name: Triboon-Windows-Client-native
          path: dist/
